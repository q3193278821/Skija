on:
  workflow_dispatch:
  pull_request:
    branches:
      - 'master'
    paths:
      - '.github'
      - 'platform'
      - 'script'
      - 'shared'
      - 'tests'
  push:
    branches:
      - '**'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'extras/**'
      - .dockerignore
      - .gitignore
      - CHANGELOG.md
      - Dockerfile
      - LICENSE
      - README.md

jobs:

  build_android:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: ["arm64", "x64"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Java
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_17_X64/bin" >> $GITHUB_PATH
      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;25.1.8937393"
      - name: Set NDK Home
        run: echo "ANDROID_NDK_HOME=${{ env.ANDROID_HOME }}/ndk/25.1.8937393" >> $GITHUB_ENV
      - name: Ensure dummy libs for harfbuzz/freetype
        run: |
          SKIA_OUT="platform/Skia-m116-d2c211228d-android-Release-${{ matrix.arch }}/out/Release-${{ matrix.arch }}"
          # 如果 harfbuzz 库不存在，创建一个空的 .a
          if [ ! -f "$SKIA_OUT/libharfbuzz.a" ]; then
            echo "Creating empty libharfbuzz.a"
            mkdir -p "$SKIA_OUT"
            ar crs "$SKIA_OUT/libharfbuzz.a"
          fi
          # 如果 freetype 库不存在，创建空的 .a（Android 下可能需要 freetype 或 freetype2）
          if [ ! -f "$SKIA_OUT/libfreetype.a" ] && [ ! -f "$SKIA_OUT/libfreetype2.a" ]; then
            echo "Creating empty libfreetype.a"
            mkdir -p "$SKIA_OUT"
            ar crs "$SKIA_OUT/libfreetype.a"
          fi
      - name: Build Android ${{ matrix.arch }}
        run: |
          rm -rf target/*/native
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export ANDROID_ABI=arm64-v8a
          else
            export ANDROID_ABI=x86_64
          fi
          export ANDROID_PLATFORM=android-33
          python3 script/build.py --system android --arch ${{ matrix.arch }} --cmake-toolchain-file $ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake
      - name: Package Android ${{ matrix.arch }}
        run: python3 script/package_platform.py --system android --arch ${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.arch }}-jars
          path: target/skija-android-${{ matrix.arch }}-*



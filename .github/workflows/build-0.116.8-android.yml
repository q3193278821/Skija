on:
  pull_request:
    branches:
      - '0.116.8-android'
    paths:
      - '.github'
      - 'platform'
      - 'script'
      - 'shared'
      - 'tests'
  push:
    branches:
      - '**'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'extras/**'
      - .dockerignore
      - .gitignore
      - CHANGELOG.md
      - Dockerfile
      - LICENSE
      - README.md

jobs:
  build_macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: abdes/gha-setup-ninja@660f330a40aefa8d11632b3f901e92a4adb33d65
      - run: |
          echo "JAVA_HOME=$JAVA_HOME_11_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_11_X64/bin" >> $GITHUB_PATH
      - run: python3 script/build.py
      - run: python3 script/test.py
      - run: python3 script/package_platform.py
      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64-jars
          path: target/skija-macos-x64-*
      - run: python3 script/clean.py
      - run: python3 script/build.py --arch arm64
      - run: python3 script/package_platform.py --arch arm64
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-jars
          path: target/skija-macos-arm64-*

  build_linux:
    runs-on: ubuntu-22.04
    steps:
      - run: |
          echo "JAVA_HOME=$JAVA_HOME_11_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_11_X64/bin" >> $GITHUB_PATH
          sudo apt-get update
          sudo apt-get --quiet --yes install ninja-build libglu1-mesa-dev libegl-dev g\+\+-9-aarch64-linux-gnu libwayland-dev libglvnd-dev libegl1-mesa libegl1-mesa-dev
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 60 --slave /usr/bin/g++ g++ /usr/bin/g++-9
          sudo update-alternatives --config gcc
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 script/build.py
      - run: python3 script/package_shared.py
      - uses: actions/upload-artifact@v4
        with:
          name: shared-jars
          path: target/skija-shared-*.jar
      - run: python3 script/test.py
      - run: python3 script/package_platform.py
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64-jars
          path: target/skija-linux-x64-*
      # Disabled until https://github.com/HumbleUI/SkiaBuild/issues/8
      # - run: python3 script/clean.py
      # - run: python3 script/build.py --arch arm64
      # - run: python3 script/package_platform.py --arch arm64
      # - uses: actions/upload-artifact@v4
      #   with:
      #     name: linux-arm64-jars
      #     path: target/skija-linux-arm64-*

  build_android:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: ["arm64", "x64"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Java
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_17_X64/bin" >> $GITHUB_PATH
      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;25.1.8937393"
      - name: Set NDK Home
        run: echo "ANDROID_NDK_HOME=${{ env.ANDROID_HOME }}/ndk/25.1.8937393" >> $GITHUB_ENV
      - name: Build Android ${{ matrix.arch }}
        run: python3 script/build.py --system android --arch ${{ matrix.arch }}
      - name: Package Android ${{ matrix.arch }}
        run: python3 script/package_platform.py --system android --arch ${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.arch }}-jars
          path: target/skija-android-${{ matrix.arch }}-*


  build_windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v1
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: abdes/gha-setup-ninja@660f330a40aefa8d11632b3f901e92a4adb33d65
      - shell: bash
        run: |
          echo "JAVA_HOME=$JAVA_HOME_11_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_11_X64/bin" >> $GITHUB_PATH
      - run: python3 script/build.py
      - shell: bash
        run: python3 script/test.py
      - run: python3 script/package_platform.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64-jars
          path: target/skija-windows-x64-*

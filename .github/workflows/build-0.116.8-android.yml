on:
  workflow_dispatch:
  pull_request:
    branches:
      - 'master'
    paths:
      - '.github'
      - 'platform'
      - 'script'
      - 'shared'
      - 'tests'
  push:
    branches:
      - '**'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'extras/**'
      - .dockerignore
      - .gitignore
      - CHANGELOG.md
      - Dockerfile
      - LICENSE
      - README.md

jobs:

  build_android:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: ["arm64", "x64"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Java
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_17_X64/bin" >> $GITHUB_PATH
      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;25.1.8937393"
      - name: Set NDK Home
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.1.8937393" >> $GITHUB_ENV
      - name: Build Android ${{ matrix.arch }}
        run: |
             rm -rf target/*/native

             JNI_INC=$(dirname $(find $ANDROID_NDK_HOME -name jni.h -type f 2>/dev/null | head -1))
             if [ -z "$JNI_INC" ]; then
               JNI_INC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include"
             fi
             export CPLUS_INCLUDE_PATH="${JNI_INC}${CPLUS_INCLUDE_PATH:+:${CPLUS_INCLUDE_PATH}}"

             # 4. 设置 Android ABI 和平台级别
             if [ "${{ matrix.arch }}" = "arm64" ]; then
               ANDROID_ABI=arm64-v8a
             else
               ANDROID_ABI=x86_64
             fi
             export ANDROID_PLATFORM=android-33

             # 5. 执行构建
             python3 script/build.py \
               --system android \
               --arch ${{ matrix.arch }} \
               --skia-release m116-d2c211228d
      - name: Package Android ${{ matrix.arch }}
        run: python3 script/package_platform.py --system android --arch ${{ matrix.arch }}
      - uses: actions/upload-artifact@v6
        with:
          name: android-${{ matrix.arch }}-jars
          path: target/skija-android-${{ matrix.arch }}-*


